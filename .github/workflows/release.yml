name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          - os: macos-26
            platform: aarch64-macos
            suffix: .dylib
          - os: macos-26
            platform: x86_64-macos
            suffix: .dylib
            target: x86_64-macos
          - os: ubuntu-latest
            platform: aarch64-linux
            suffix: .so
            target: aarch64-linux-gnu
          - os: ubuntu-latest
            platform: x86_64-freebsd
            suffix: .so
            target: x86_64-freebsd
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3 for Zig 0.15.2
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: ${{ matrix.platform }}-zig-0.15.2

      - name: Build native module
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            zig build --prefix . -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast -Dcpu=baseline
          else
            zig build --prefix . -Doptimize=ReleaseFast -Dcpu=baseline
          fi

      - name: Strip non-exported symbols (macOS)
        if: runner.os == 'macOS'
        run: strip -x ghostel-module${{ matrix.suffix }}

      - name: Rename artifact for release
        run: |
          mv ghostel-module${{ matrix.suffix }} \
             ghostel-module-${{ matrix.platform }}${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: ghostel-module-${{ matrix.platform }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
