name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  NIX_EMACS_CI_REF: 868482a78575138aebb1b5c16a9266b95c800f2e

jobs:
  byte-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: ${{ matrix.emacs_version }}
        run: bash .github/scripts/install-emacs.sh

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Byte-compile
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) \
            EMACSFLAGS="-L /tmp/compat" \
            byte-compile

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: '29.4'
        run: bash .github/scripts/install-emacs.sh

      - name: Run package-lint, checkdoc, docquotes
        # `make package-lint' self-provisions its deps (package-lint +
        # a local ghostel install) into an isolated package-user-dir.
        run: make package-lint checkdoc docquotes

  test-zig:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run pure-Zig unit tests
        shell: bash
        run: |
          target_args=()
          if [ "${{ runner.os }}" = "Windows" ]; then
            target_args=(-Dtarget=x86_64-windows-gnu)
          fi
          zig build test "${target_args[@]}"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: ${{ matrix.emacs_version }}
        run: bash .github/scripts/install-emacs.sh

      - name: Install fish
        run: sudo apt-get install -y fish

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Run pure Elisp tests
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) \
            EMACSFLAGS="-L /tmp/compat" \
            test

  test-evil:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: ${{ matrix.emacs_version }}
        run: bash .github/scripts/install-emacs.sh

      - name: Install evil
        run: |
          git clone --depth 1 https://github.com/emacs-evil/evil.git /tmp/evil

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Run evil-ghostel tests
        run: |
          emacs --batch -Q -L /tmp/compat -L /tmp/evil -L lisp -L extensions/evil-ghostel \
            -l ert \
            -l test/evil-ghostel-test.el \
            -f evil-ghostel-test-run

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
          - os: macos-26
            platform: aarch64-macos
            suffix: .dylib
          - os: macos-26
            platform: x86_64-macos
            suffix: .dylib
            target: x86_64-macos
          - os: ubuntu-latest
            platform: aarch64-linux
            suffix: .so
            target: aarch64-linux-gnu
          - os: ubuntu-latest
            platform: x86_64-freebsd
            suffix: .so
            target: x86_64-freebsd
          - os: windows-latest
            platform: x86_64-windows
            suffix: .dll
            target: x86_64-windows-gnu
          - os: windows-latest
            platform: aarch64-windows
            suffix: .dll
            target: aarch64-windows-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3 for Zig 0.15.2
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: ${{ matrix.platform }}-zig-0.15.2

      - name: Download ConPTY runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://www.nuget.org/api/v2/package/Microsoft.Windows.Console.ConPTY/1.24.260512001 -OutFile conpty.zip
          Expand-Archive -LiteralPath conpty.zip -DestinationPath conpty-package -Force

      - name: Build native module
        shell: bash
        run: |
          conpty_args=()
          if [ "${{ runner.os }}" = "Windows" ]; then
            conpty_args=(-Dwindows-conpty-package-dir=conpty-package)
          fi
          if [ -n "${{ matrix.target }}" ]; then
            zig build --prefix . -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast -Dcpu=baseline "${conpty_args[@]}"
          else
            zig build --prefix . -Doptimize=ReleaseFast -Dcpu=baseline "${conpty_args[@]}"
          fi

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}
          path: |
            ghostel-module${{ matrix.suffix }}
            ghostel-module.version
            conpty.dll
            x64/OpenConsole.exe
            arm64/OpenConsole.exe

  test-native:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: '29.4'
          - os: ubuntu-latest
            platform: x86_64-linux
            suffix: .so
            emacs_version: 'snapshot'
          - os: macos-26
            platform: aarch64-macos
            suffix: .dylib
            emacs_version: '29.4'
          - os: macos-26
            platform: aarch64-macos
            suffix: .dylib
            emacs_version: 'snapshot'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: ${{ matrix.emacs_version }}
        run: bash .github/scripts/install-emacs.sh

      - name: Install zsh and fish
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh fish

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-${{ matrix.platform }}

      - name: Mark pre-built module as up-to-date
        # The module was built in a prior job and its mtime predates the
        # checkout, so make would consider it stale w.r.t. src/*.zig and
        # try to re-invoke `zig build' (Zig isn't installed in this job).
        # Touching the artifact pins the Make dependency.
        run: touch ghostel-module${{ matrix.suffix }}

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Run native module tests
        run: |
          make -j$(getconf _NPROCESSORS_ONLN) \
            EMACSFLAGS="-L /tmp/compat" \
            test-native

  test-native-windows:
    needs: build-native
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            mingw-w64-ucrt-x86_64-emacs
            mingw-w64-ucrt-x86_64-python

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-x86_64-windows

      - name: Run Windows native module tests
        shell: msys2 {0}
        run: |
          touch ghostel-module.dll
          git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat
          make \
            EMACS="timeout 60s emacs" \
            EMACSFLAGS="-L /tmp/compat" \
            test-native

  test-hypothesis-cases:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}

      - name: Install pinned Emacs
        env:
          EMACS_VERSION: '29.4'
        run: bash .github/scripts/install-emacs.sh

      - name: Download native module
        uses: actions/download-artifact@v4
        with:
          name: ghostel-module-x86_64-linux

      - name: Mark pre-built module as up-to-date
        run: touch ghostel-module.so

      - name: Install compat
        run: git clone --depth 1 https://github.com/emacs-compat/compat.git /tmp/compat

      - name: Install Hypothesis test dependencies
        run: python3 -m pip install -r test/hypothesis/requirements.txt

      - name: Run saved Hypothesis regression cases
        run: |
          make EMACSFLAGS="-L /tmp/compat" test-hypothesis-cases
